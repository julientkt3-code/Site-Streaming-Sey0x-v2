<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sey0x - Watch Free Movies and TV Shows Online in HD</title>
    <meta name="description" content="Stream the latest movies and TV shows for free on Sey0x." />

    <!-- ═══════════════════════════════════════════════════════
         ANTI-POPUP — exécuté EN PREMIER, avant tout le reste
         Bloque window.open au niveau le plus bas possible
         ═══════════════════════════════════════════════════════ -->
    <script>
    (function() {
      'use strict';

      // 1. Écraser window.open définitivement et le rendre non-configurable
      try {
        Object.defineProperty(window, 'open', {
          value: function() { return null; },
          writable: false,
          configurable: false
        });
      } catch(e) {
        window.open = function() { return null; };
      }

      // 2. Bloquer les schémas d'app mobile
      var BAD = ['intent:','market:','android-app:','ios-app:','itms-apps:','itms:','fb:','callto:','geo:','whatsapp:','tg:','viber:'];

      // 3. Intercepter TOUS les clics sur des liens
      document.addEventListener('click', function(e) {
        var el = e.target;
        while(el && el.tagName !== 'A') el = el.parentElement;
        if(!el) return;
        var href = el.href || '';
        var target = el.target || '';
        if(target === '_blank' || target === '_new' || BAD.some(function(s){ return href.toLowerCase().indexOf(s) === 0; })) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);

      // 4. Même chose sur mobile
      document.addEventListener('touchend', function(e) {
        var el = e.target;
        while(el && el.tagName !== 'A') el = el.parentElement;
        if(!el) return;
        var href = el.href || '';
        var target = el.target || '';
        if(target === '_blank' || target === '_new' || BAD.some(function(s){ return href.toLowerCase().indexOf(s) === 0; })) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);

      // 5. Quand la page perd le focus (signe qu'une popup s'est ouverte)
      //    on refocus immédiatement
      var _lastFocus = Date.now();
      window.addEventListener('focus', function() { _lastFocus = Date.now(); });
      window.addEventListener('blur', function() {
        // Si le blur arrive dans les 2 secondes après le dernier focus = popup
        setTimeout(function() { try { window.focus(); } catch(e){} }, 100);
      });

      // 6. Surveiller visibilitychange — quand on revient sur la page
      //    après une navigation forcée
      document.addEventListener('visibilitychange', function() {
        if(document.visibilityState === 'visible') {
          try { window.focus(); } catch(e){}
        }
      });

      // 7. Bloquer beforeunload
      window.addEventListener('beforeunload', function(e) {
        e.preventDefault();
        e.returnValue = '';
        return '';
      }, true);

      // 8. Patch history pour bloquer navigations externes
      var _ownOrigin = window.location.origin;
      var _isExt = function(url) {
        if(!url) return false;
        try {
          if(url.startsWith('/') || url.startsWith('#') || url.startsWith(_ownOrigin)) return false;
          return new URL(url).origin !== _ownOrigin;
        } catch(e) { return BAD.some(function(s){ return url.toLowerCase().indexOf(s)===0; }); }
      };
      var _origPush = history.pushState.bind(history);
      var _origReplace = history.replaceState.bind(history);
      history.pushState = function(s,t,url) { if(!_isExt(url)) _origPush(s,t,url); };
      history.replaceState = function(s,t,url) { if(!_isExt(url)) _origReplace(s,t,url); };

    })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
